<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESIC Regional Office, Telangana - Accounting Units</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="home-body">

<header class="home-header">
  <img src="esic2.png" alt="ESIC Logo" class="home-logo">
  <h1>ESIC Regional Office, Telangana</h1>
  <p class="home-tagline">Select an Accounting Unit to view its Employee Directory</p>
</header>

<main>
  <!-- Search -->
  <section class="controls unit-controls">
    <input
      type="search"
      id="unitSearchInput"
      placeholder="Search employee by name, ID or designation"
      aria-label="Search employees"
    >
  </section>

  <!-- Employee search results (shown while searching) -->
  <section id="employeeResultsContainer" class="employee-results-container"></section>

  <!-- Unit Cards (shown when not searching) -->
  <section id="unitCardsContainer" class="unit-cards-container">
    <p class="loading-text">Loading accounting units...</p>
  </section>
</main>

<footer class="home-footer">
  <p>ESIC Regional Office, Telangana</p>
</footer>

<script src="config.js"></script>
<script src="units.js"></script>
<script src="home.js"></script>

</body>
</html>
